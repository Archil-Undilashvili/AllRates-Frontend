<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>შექმენი Alert - AllRates.ge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="js/header.js"></script>

    <main class="page-section" style="width: 100%; min-height: 55vh; display: flex; justify-content: center; align-items: flex-start;">
        <div class="user-space-shell">
            <section class="user-space-card">
                <div class="user-space-header">
                    <div>
                        <h1 class="user-space-title">შექმენი Alert</h1>
                        <p class="user-space-muted" id="userSpaceStatus"></p>
                    </div>
                    <nav class="user-space-nav" aria-label="პირადი სივრცის ნავიგაცია">
                        <a href="/dashboard">მთავარი</a>
                        <a href="/create-dashboard">შექმენი დეშბორდი</a>
                        <a href="/create-alert" class="active">შექმენი Alert</a>
                    </nav>
                </div>
            </section>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");
            const status = document.getElementById("userSpaceStatus");
            const apiOrigin = window.ALLRATES_API_ORIGIN
                || (["localhost", "127.0.0.1", ""].includes(window.location.hostname) ? "http://localhost:3000" : "https://allrates-backend-api.onrender.com");

            if (!token) {
                window.location.href = "/";
                return;
            }

            try {
                const res = await fetch(`${apiOrigin}/api/auth/me`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await res.json();

                if (!res.ok) {
                    localStorage.removeItem("token");
                    localStorage.removeItem("user");
                    window.location.href = "/";
                    return;
                }

                localStorage.setItem("user", JSON.stringify(data.user));
                status.textContent = "";
            } catch (error) {
                status.textContent = "სერვერთან კავშირის შეცდომა";
            }
        });
    </script>
</body>
</html>
