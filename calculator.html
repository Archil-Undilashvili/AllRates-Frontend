<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მოძებნე საუკეთესო კურსი</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .calc-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }
        .calc-row {
            display: flex;
            gap: 20px;
            margin-bottom: 1.5rem;
            align-items: flex-end;
        }
        .calc-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .calc-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        .calc-input, .calc-select {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .calc-input:focus, .calc-select:focus {
            border-color: var(--btn-bg);
        }
        .exchange-icon {
            display: flex;
            justify-content: center;
            margin: 10px 0 25px 0;
            color: var(--text-muted);
        }
        .exchange-icon svg {
            width: 24px;
            height: 24px;
        }
        .info-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<script src="js/header.js"></script>
<div class="page-section" style="width: 100%; display: flex; justify-content: center;">
    <div style="width: 100%; max-width: 800px; padding: 20px 0 60px 0;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <span style="display: inline-block; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--btn-bg); font-weight: 600; background: #eff6ff; padding: 6px 16px; border-radius: 20px; margin-bottom: 1.2rem;">კალკულატორი</span>
            <h2 style="font-size: 2.2rem; font-weight: 700; color: var(--primary); margin: 0 0 0.5rem 0; line-height: 1.2;">მოძებნე საუკეთესო კურსი</h2>
            <div style="width: 48px; height: 3px; background: var(--btn-bg); margin: 1rem auto; border-radius: 2px;"></div>
            <p style="font-size: 1rem; color: var(--text-muted); line-height: 1.8; max-width: 520px; margin: 0 auto;">
                კონვერტაცია მიმდინარეობს საქართველოს ეროვნული ბანკის (NBG) ოფიციალური კურსების მიხედვით.
            </p>
        </div>

        <div class="calc-container">
            <!-- ვიყიდი -->
            <div class="calc-row">
                <div class="calc-col" style="flex: 0.4;">
                    <label class="calc-label">ვიყიდი</label>
                    <select id="buy-currency" class="calc-select">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="RUB">RUB</option>
                        <option value="TRY">TRY</option>
                        <option value="GEL">GEL</option>
                    </select>
                </div>
                <div class="calc-col" style="flex: 0.6;">
                    <label class="calc-label">თანხა</label>
                    <input type="number" id="buy-amount" class="calc-input" placeholder="0.00" min="0" step="0.01">
                </div>
            </div>

            <div class="exchange-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path>
                </svg>
            </div>

            <!-- გავყიდი -->
            <div class="calc-row">
                <div class="calc-col" style="flex: 0.4;">
                    <label class="calc-label">გავყიდი</label>
                    <select id="sell-currency" class="calc-select">
                        <option value="GEL" selected>GEL</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="RUB">RUB</option>
                        <option value="TRY">TRY</option>
                    </select>
                </div>
                <div class="calc-col" style="flex: 0.6;">
                    <label class="calc-label">თანხა</label>
                    <input type="number" id="sell-amount" class="calc-input" placeholder="0.00" readonly style="background: #f8fafc;">
                </div>
            </div>

            <p class="info-text" id="rate-info">იტვირთება კურსები...</p>
        </div>
    </div>
</div>

<script>
    let rates = { GEL: 1 }; // Base is GEL

    async function fetchNBGRates() {
        try {
            const date = new Date();
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const formattedDate = `${yyyy}-${mm}-${dd}`;
            
            const res = await fetch(`https://nbg.gov.ge/gw/api/ct/monetarypolicy/currencies/ka/json?date=${formattedDate}`);
            if (!res.ok) throw new Error("Failed to fetch");
            const data = await res.json();
            
            if (data && data.length > 0 && data[0].currencies) {
                data[0].currencies.forEach(c => {
                    // NBG rate is for c.quantity units. So 1 unit = c.rate / c.quantity in GEL.
                    rates[c.code] = c.rate / (c.quantity || 1);
                });
                calculate();
                document.getElementById('rate-info').innerText = "მონაცემები განახლებულია (NBG)";
            }
        } catch (e) {
            console.error(e);
            document.getElementById('rate-info').innerText = "კურსების ჩატვირთვა ვერ მოხერხდა";
        }
    }

    function calculate() {
        const buyAmt = parseFloat(document.getElementById('buy-amount').value);
        const buyCcy = document.getElementById('buy-currency').value;
        const sellCcy = document.getElementById('sell-currency').value;

        if (isNaN(buyAmt) || buyAmt <= 0) {
            document.getElementById('sell-amount').value = '';
            return;
        }

        const rateBuy = rates[buyCcy];
        const rateSell = rates[sellCcy];

        if (rateBuy && rateSell) {
            // How much GEL does the bought amount cost?
            const valueInGEL = buyAmt * rateBuy;
            // How much of sellCcy is needed to cover that GEL value?
            const sellAmt = valueInGEL / rateSell;
            document.getElementById('sell-amount').value = sellAmt.toFixed(2);
        }
    }

    document.getElementById('buy-amount').addEventListener('input', calculate);
    document.getElementById('buy-currency').addEventListener('change', calculate);
    document.getElementById('sell-currency').addEventListener('change', calculate);

    fetchNBGRates();
</script>
</body>
</html>
