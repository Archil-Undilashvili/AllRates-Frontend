                    localStorage.removeItem("user");
                    sessionStorage.removeItem("token");

        function escapeHtml(value) {
            return String(value || "").replace(/[&<>"']/g, char => ({
                "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
            }[char]));
        }

        function readNumber(item, keys) {
            for (const key of keys) {
                const value = Number(item[key]);
                if (!Number.isNaN(value) && value > 0) return value;
            }
            return null;
        }

        function parseDisplayNumber(value) {
            const normalized = String(value ?? "").replace(/,/g, "").trim();
            if (!normalized) return NaN;
            const parsed = Number(normalized);
            return Number.isFinite(parsed) ? parsed : NaN;
        }

        function getDashboardOfficialUnitRate(currency) {
            try {
                const config = CURRENCY_CONFIG[currency];
                const code = config?.code || String(currency || "").toUpperCase();
                const liveRate = Number(dashboardOfficialUnitRates[code]);
                if (Number.isFinite(liveRate) && liveRate > 0) return liveRate;

                const cachedNBG = JSON.parse(localStorage.getItem("cachedNBGData") || "{}");
                const normalized = Number(cachedNBG.marketOfficialRates?.[code]);
                if (Number.isFinite(normalized) && normalized > 0) return normalized;

                let raw = Number(cachedNBG[code.toLowerCase()]);
                if (!Number.isFinite(raw) || raw <= 0) return NaN;
                if ((code === "RUB" || code === "TRY") && raw > 1) raw /= 100;
                return raw;
            } catch (_) {
                return NaN;
            }
        }

        function getDashboardRateRelevanceThreshold(currency) {
            return ["usd", "eur"].includes(String(currency || "").toLowerCase()) ? 0.10 : 0.50;
        }

        function isDashboardRateOutlier(item, currency) {
            const config = CURRENCY_CONFIG[currency];
            const official = getDashboardOfficialUnitRate(currency);
            if (!config || !Number.isFinite(official) || official <= 0) return false;

            const buy = readNumber(item, config.buy);
            const sell = readNumber(item, config.sell);
            if (!Number.isFinite(buy) || !Number.isFinite(sell) || buy <= 0 || sell <= 0) return false;
            if (buy === sell) return true;

            const threshold = getDashboardRateRelevanceThreshold(currency);
            return Math.abs(buy - official) / official > threshold || Math.abs(sell - official) / official > threshold;
        }

        async function ensureDashboardOfficialRates() {
            if (Object.keys(dashboardOfficialUnitRates).length) return dashboardOfficialUnitRates;
            if (!dashboardOfficialRatesPromise) {
                dashboardOfficialRatesPromise = fetch(`${NBG_API_URL}?t=${Date.now()}`, { cache: "no-store" })
                    .then(res => {
                        if (!res.ok) throw new Error("NBG API unavailable");
                        return res.json();
                    })
                    .then(data => {
                        const currencies = data?.[0]?.currencies || [];
                        dashboardOfficialUnitRates = currencies.reduce((rates, item) => {
                            const unitRate = Number(item?.rate) / Number(item?.quantity || 1);
                            if (item?.code && Number.isFinite(unitRate) && unitRate > 0) rates[item.code] = unitRate;
                            return rates;
                        }, {});
                        return dashboardOfficialUnitRates;
                    })
                    .catch(error => {
                        console.warn("NBG official rates for dashboard outlier check failed:", error.message);
                        return {};
                    });
            }
            return dashboardOfficialRatesPromise;
        }

        async function fetchJsonWithFallback(urls) {
            let lastError = null;
            for (const url of [...new Set(urls.filter(Boolean))]) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const data = await response.json();
                    if (!Array.isArray(data) || data.length < 10) {
                        throw new Error(`Incomplete rates payload (${Array.isArray(data) ? data.length : "not-array"})`);
                    }
                    return data;
                } catch (error) {
                    lastError = error;
                    console.warn(`Rates API fetch failed (${url}):`, error.message);
                }
            }
            throw lastError || new Error("Rates API fetch failed");
        }

            renderDashboardShell();
            bindSlots();
            bindDashboardDrag();
            bindDashboardFilters();
            bindFilterToggle();
            bindDashboardSave(apiOrigin, token, user);
            restoreDashboardCache(user);
            await Promise.allSettled([
                loadCompanyPicker(apiOrigin),
                loadOfficialPicker(),
                loadForexPicker(),
                loadCryptoPicker(),
                loadAssetPicker()
            ]);
            await loadSavedDashboard(apiOrigin, token);
            await initDashboardAlerts(apiOrigin, token);

        function bindSlots() {
            document.querySelectorAll(".dashboard-slot").forEach(slot => {
                const addButton = slot.querySelector(".dashboard-add-btn");
                const picker = slot.querySelector(".dashboard-picker");
                const search = slot.querySelector(".dashboard-search");
                if (!addButton || !picker || !search) return;

                addButton.addEventListener("click", event => {
                    event.stopPropagation();
                    document.querySelectorAll(".dashboard-picker").forEach(openPicker => {
                        if (openPicker !== picker) openPicker.hidden = true;
                    });
                    picker.hidden = !picker.hidden;
                    if (!picker.hidden) {
                        search.value = "";
                        filterPicker(slot, "");
                        search.focus();
                    }
                });

                search.addEventListener("input", () => filterPicker(slot, search.value));
            });

            document.addEventListener("click", event => {
                if (!event.target.closest(".dashboard-slot")) {
                    document.querySelectorAll(".dashboard-picker").forEach(picker => picker.hidden = true);
                }
            });

            document.addEventListener("click", event => {
                const menuButton = event.target.closest(".dashboard-item-menu-btn");
                const deleteButton = event.target.closest('[data-dashboard-action="delete"]');
                const notifyButton = event.target.closest('[data-dashboard-action="notify"]');

                if (menuButton) {
                    event.stopPropagation();
                    const menu = menuButton.closest(".dashboard-item-menu");
                    const shouldOpen = !menu.classList.contains("open");
                    closeItemMenus();
                    if (shouldOpen) menu.classList.add("open");
                    return;
                }

                if (deleteButton) {
                    event.stopPropagation();
                    deleteButton.closest(".dashboard-selected-item")?.remove();
                    closeItemMenus();
                    return;
                }

                if (notifyButton) {
                    event.stopPropagation();
                    closeItemMenus();
                    return;
                }

                if (!event.target.closest(".dashboard-item-menu")) closeItemMenus();
            });
        }

        function bindDashboardDrag() {
            const grid = document.getElementById("dashboardBuilderGrid");
            if (!grid) return;
            let draggedSlot = null;

            grid.addEventListener("dragstart", event => {
                const slot = event.target.closest(".dashboard-slot");
                if (!slot) return;
                draggedSlot = slot;
                slot.classList.add("is-dragging");
                event.dataTransfer.effectAllowed = "move";
                event.dataTransfer.setData("text/plain", slot.dataset.slot || "");
            });

            grid.addEventListener("dragend", () => {
                draggedSlot?.classList.remove("is-dragging");
                draggedSlot = null;
            });

            grid.addEventListener("dragover", event => {
                if (!draggedSlot) return;
                const target = event.target.closest(".dashboard-slot");
                if (!target || target === draggedSlot) return;
                event.preventDefault();
                const rect = target.getBoundingClientRect();
                const beforeTarget = event.clientX < rect.left + rect.width / 2;
                grid.insertBefore(draggedSlot, beforeTarget ? target : target.nextSibling);
            });
        }

        function bindDashboardFilters() {
            const grid = document.getElementById("dashboardBuilderGrid");
            const filters = Array.from(document.querySelectorAll("[data-filter-slot]"));
            if (!grid || !filters.length) return;

            const updateVisibleSlots = changedFilter => {
                if (changedFilter?.checked) {
                    const checkedCount = filters.filter(filter => filter.checked).length;
                    if (checkedCount > DASHBOARD_MAX_VISIBLE) {
                        changedFilter.checked = false;
                        setDashboardStatus("error", `მაქსიმუმ ${DASHBOARD_MAX_VISIBLE} ბოქსის არჩევაა შესაძლებელი`);
                    }
                }
                filters.filter(filter => filter.checked).slice(DASHBOARD_MAX_VISIBLE).forEach(filter => {
                    filter.checked = false;
                });

                const checkedFilters = filters.filter(filter => filter.checked);
                if (!checkedFilters.length && changedFilter) changedFilter.checked = true;

                let visibleCount = 0;
                filters.forEach(filter => {
                    const slot = grid.querySelector(`[data-slot="${filter.dataset.filterSlot}"]`);
                    if (!slot) return;
                    slot.hidden = !filter.checked;
                    if (filter.checked) visibleCount += 1;
                });

                const columns = Math.min(DASHBOARD_GRID_COLUMNS, Math.max(1, visibleCount));
                grid.style.gridTemplateColumns = `repeat(${columns}, var(--dashboard-slot-width))`;
            };

            window.updateDashboardVisibleSlots = updateVisibleSlots;

            filters.forEach(filter => {
                filter.addEventListener("change", () => updateVisibleSlots(filter));
            });

            updateVisibleSlots();
        }

        function bindFilterToggle() {
            const panel = document.querySelector(".dashboard-view-filter");
            const toggle = document.getElementById("dashboardFilterToggle");
            if (!panel || !toggle) return;

            toggle.addEventListener("click", () => {
                const isCollapsed = panel.classList.toggle("is-collapsed");
                toggle.setAttribute("aria-expanded", String(!isCollapsed));
                toggle.setAttribute("aria-label", isCollapsed ? "ფილტრის პანელის გაშლა" : "ფილტრის პანელის დაკეცვა");
                toggle.querySelector("span").textContent = isCollapsed ? "▼" : "▲";
            });
        }

        function buildDashboardAlertCatalog(data) {
            const map = new Map();
            data.forEach(item => {
                const key = companyKey(item);
                if (!key) return;
                const name = COMPANY_NAMES_KA[key] || item.company || item.Company || key;
                const entry = map.get(key) || { key, name, pairs: [] };

                COMPANY_PAIRS.forEach(pairConfig => {
                    const buy = readNumber(item, pairConfig.buy);
                    const sell = readNumber(item, pairConfig.sell);
                    if (!buy && !sell) return;
                    entry.pairs.push({
                        pair: pairConfig.pair,
                        buy,
                        sell,
                        digits: pairConfig.digits
                    });
                });

                if (entry.pairs.length) map.set(key, entry);
            });

            return Array.from(map.values()).sort((a, b) => a.name.localeCompare(b.name, "ka"));
        }

        function buildDashboardAlertForexCatalog(sheetRows) {
            const pairColumns = [
                ["Pair (Popular)", "Rate (Popular)"],
                ["Pair (vs USD)", "Rate (vs USD)"],
                ["Pair (vs EUR)", "Rate (vs EUR)"],
                ["Pair (vs GBP)", "Rate (vs GBP)"],
                ["Pair (vs CHF)", "Rate (vs CHF)"]
            ];
            const rateMap = new Map();

            sheetRows.forEach(row => {
                pairColumns.forEach(([pairKey, rateKey]) => {
                    const pair = String(row[pairKey] || "").trim().toUpperCase();
                    const rate = Number(row[rateKey]);
                    if (pair && Number.isFinite(rate)) rateMap.set(pair, rate);
                });
            });

            return [
                ...FOREX_PAIRS,
                ...Array.from(rateMap.keys()).filter(pair => !FOREX_PAIRS.includes(pair))
            ].filter(pair => rateMap.has(pair)).map(pair => ({
                pair,
                label: `${pair.slice(0, 3)}/${pair.slice(3, 6)}`,
                rate: rateMap.get(pair),
                digits: 4
            }));
        }

        function buildDashboardAlertCryptoCatalog(data) {
            return (Array.isArray(data) ? data : [])
                .filter(item => item.symbol?.endsWith("USDT") && !item.symbol.includes("UPUSDT") && !item.symbol.includes("DOWNUSDT") && !item.symbol.includes("BULLUSDT") && !item.symbol.includes("BEARUSDT"))
                .sort(sortCryptoTickers)
                .slice(0, 100)
                .map(item => {
                    const pair = String(item.symbol || "").toUpperCase();
                    const symbol = pair.replace("USDT", "");
                    const name = CRYPTO_NAMES[symbol] || symbol;
                    return {
                        pair,
                        label: `${symbol}/USDT`,
                        title: `${name} (${symbol})`,
                        rate: Number(item.lastPrice),
                        digits: Number(item.lastPrice) > 1 ? 2 : 6
                    };
                })
                .filter(item => Number.isFinite(item.rate));
        }

        function buildDashboardAlertAssetCatalog(priceMap = new Map()) {
            return ASSET_ITEMS.map(item => {
                const rate = parseDisplayNumber(priceMap.get(item.name.toLowerCase()));
                return {
                    pair: item.name,
                    label: item.name,
                    title: item.name,
                    rate,
                    digits: rate > 100 ? 2 : 4
                };
            }).filter(item => Number.isFinite(item.rate));
        }

        function createEmptyAlert(alertType = "company") {
            return {
                clientId: `alert-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                alertType,
                companyKey: "",
                companyName: "",
                pair: alertType === "forex" ? (dashboardAlertForexCatalog[0]?.pair || "") : (alertType === "crypto" ? (dashboardAlertCryptoCatalog[0]?.pair || "") : (alertType === "asset" ? (dashboardAlertAssetCatalog[0]?.pair || "") : "")),
                side: ["forex", "crypto", "asset"].includes(alertType) ? "rate" : "sell",
                targetRate: "",
                operator: "",
                status: "active"
            };
        }

        function normalizeLoadedAlert(alert) {
            const loadedType = alert.alertType || (alert.side === "rate" || (!alert.companyKey && !alert.companyName && !COMPANY_PAIRS.some(pair => pair.pair === alert.pair)) ? "forex" : "company");
            return {
                clientId: alert._id || alert.id || `alert-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                id: alert._id || alert.id,
                alertType: loadedType,
                companyKey: alert.companyKey || "",
                companyName: alert.companyName || "",
                pair: alert.pair || "",
                side: ["forex", "crypto", "asset"].includes(loadedType) ? "rate" : (alert.side || "sell"),
                targetRate: Number.isFinite(Number(alert.targetRate)) ? String(alert.targetRate) : "",
                operator: alert.operator || "",
                status: alert.status || "active",
                triggeredRate: alert.triggeredRate,
                triggeredAt: alert.triggeredAt
            };
        }

        function getAlertCatalogCompany(companyKey) {
            return dashboardAlertCatalog.find(company => company.key === companyKey);
        }

        function getAlertPairInfo(alert) {
            if (alert.alertType === "forex") {
                return dashboardAlertForexCatalog.find(pair => pair.pair === alert.pair) || null;
            }
            if (alert.alertType === "crypto") {
                return dashboardAlertCryptoCatalog.find(pair => pair.pair === alert.pair) || null;
            }
            if (alert.alertType === "asset") {
                const selectedPair = String(alert.pair || "").toLowerCase();
                return dashboardAlertAssetCatalog.find(pair => String(pair.pair || "").toLowerCase() === selectedPair) || null;
            }
            const company = getAlertCatalogCompany(alert.companyKey);
            return company?.pairs.find(pair => pair.pair === alert.pair) || null;
        }

        function getAlertCurrentRate(alert) {
            if (["forex", "crypto", "asset"].includes(alert.alertType)) {
                const pair = getAlertPairInfo(alert);
                const value = Number(pair?.rate);
                return Number.isFinite(value) ? value : null;
            }
            const pair = getAlertPairInfo(alert);
            if (!pair) return null;
            const value = alert.side === "buy" ? pair.buy : pair.sell;
            return Number.isFinite(Number(value)) ? Number(value) : null;
        }

        function alertCompanyOptions(selectedKey) {
            const options = ['<option value="">აირჩიე კომპანია</option>'];
            dashboardAlertCatalog.forEach(company => {
                options.push(`<option value="${escapeHtml(company.key)}"${company.key === selectedKey ? " selected" : ""}>${escapeHtml(company.name)}</option>`);
            });
            return options.join("");
        }

        function alertPairOptions(alert) {
            if (alert.alertType === "forex") {
                const options = ['<option value="">აირჩიე წყვილი</option>'];
                dashboardAlertForexCatalog.forEach(pair => {
                    options.push(`<option value="${escapeHtml(pair.pair)}"${pair.pair === alert.pair ? " selected" : ""}>${escapeHtml(pair.label)}</option>`);
                });
                return options.join("");
            }
            if (alert.alertType === "crypto") {
                const options = ['<option value="">აირჩიე კრიპტო</option>'];
                dashboardAlertCryptoCatalog.forEach(pair => {
                    options.push(`<option value="${escapeHtml(pair.pair)}"${pair.pair === alert.pair ? " selected" : ""}>${escapeHtml(pair.label)}</option>`);
                });
                return options.join("");
            }
            if (alert.alertType === "asset") {
                const options = ['<option value="">აირჩიე აქტივი</option>'];
                const selectedPair = String(alert.pair || "").toLowerCase();
                dashboardAlertAssetCatalog.forEach(pair => {
                    const selected = String(pair.pair || "").toLowerCase() === selectedPair;
                    options.push(`<option value="${escapeHtml(pair.pair)}"${selected ? " selected" : ""}>${escapeHtml(pair.label)}</option>`);
                });
                return options.join("");
            }
            const company = getAlertCatalogCompany(alert.companyKey);
            if (!company) return '<option value="">აირჩიე წყვილი</option>';
            const options = company.pairs.map(pair => (
                `<option value="${escapeHtml(pair.pair)}"${pair.pair === alert.pair ? " selected" : ""}>${escapeHtml(pair.pair.replace("GEL", "/GEL"))}</option>`
            ));
            return options.join("");
        }

        function renderDashboardAlerts() {
            const list = document.getElementById("dashboardAlertsList");
            if (!list) return;
            if (!dashboardAlerts.length) dashboardAlerts = [createEmptyAlert()];

            list.innerHTML = dashboardAlerts.map((alert, index) => {
                const locked = alert.status === "triggered";
                const currentRate = getAlertCurrentRate(alert);
                const currentText = Number.isFinite(currentRate)
                    ? currentRate.toFixed(getAlertPairInfo(alert)?.digits || 4)
                    : "—";
                const message = locked
                    ? `Alert შესრულდა${Number.isFinite(Number(alert.triggeredRate)) ? ` · ${Number(alert.triggeredRate).toFixed(getAlertPairInfo(alert)?.digits || 4)}` : ""}`
                    : "";

                if (["forex", "crypto", "asset"].includes(alert.alertType)) {
                    const isCryptoAlert = alert.alertType === "crypto";
                    const isAssetAlert = alert.alertType === "asset";
                    return `
                        <div class="dashboard-alert-row dashboard-alert-row-forex${locked ? " is-triggered" : ""}" data-alert-index="${index}" data-alert-client-id="${escapeHtml(alert.clientId)}">
                            <label>
                                <span>${isCryptoAlert ? "კრიპტო წყვილი" : (isAssetAlert ? "აქტივი" : "სავალუტო წყვილი")}</span>
                                <select data-alert-field="pair"${locked ? " disabled" : ""}>${alertPairOptions(alert)}</select>
                                <small>მიმდინარე: ${escapeHtml(currentText)}</small>
                            </label>
                            <label>
                                <span>სამიზნე კურსი</span>
                                <input type="number" step="0.0001" data-alert-field="targetRate" value="${escapeHtml(alert.targetRate)}" placeholder="0.0000"${locked ? " disabled" : ""}>
                                <small>${escapeHtml(message)}</small>
                            </label>
                            <div class="dashboard-alert-trigger-field">
                                <span>პირობა</span>
                                <div class="dashboard-alert-trigger-group" role="group" aria-label="Alert trigger">
                                    <button type="button" data-alert-operator="lt" class="${alert.operator === "lt" ? "active" : ""}"${locked ? " disabled" : ""}>ნაკლებია</button>
                                    <button type="button" data-alert-operator="gt" class="${alert.operator === "gt" ? "active" : ""}"${locked ? " disabled" : ""}>მეტია</button>
                                </div>
                                <small>${isCryptoAlert ? "კრიპტო ფასი" : (isAssetAlert ? "აქტივის ფასი" : "FOREX კურსი")}</small>
                            </div>
                            <span class="dashboard-alert-done" aria-label="Alert შესრულებულია">${locked ? "✓" : ""}</span>
                            ${alertMenuHtml(locked || dashboardAlerts.length > 1)}
                        </div>
                    `;
                }

                return `
                    <div class="dashboard-alert-row${locked ? " is-triggered" : ""}" data-alert-index="${index}" data-alert-client-id="${escapeHtml(alert.clientId)}">
                        <label>
                            <span>კომპანია</span>
                            <select data-alert-field="companyKey"${locked ? " disabled" : ""}>${alertCompanyOptions(alert.companyKey)}</select>
                            <small></small>
                        </label>
                        <label>
                            <span>სავალუტო წყვილი</span>
                            <select data-alert-field="pair"${locked || !alert.companyKey ? " disabled" : ""}>${alertPairOptions(alert)}</select>
                            <small></small>
                        </label>
                        <label>
                            <span>ყიდვა/გაყიდვა</span>
                            <select data-alert-field="side"${locked ? " disabled" : ""}>
                                <option value="buy"${alert.side === "buy" ? " selected" : ""}>ყიდვა</option>
                                <option value="sell"${alert.side === "sell" ? " selected" : ""}>გაყიდვა</option>
                            </select>
                            <small>მიმდინარე: ${escapeHtml(currentText)}</small>
                        </label>
                        <label>
                            <span>სამიზნე კურსი</span>
                            <input type="number" step="0.0001" data-alert-field="targetRate" value="${escapeHtml(alert.targetRate)}" placeholder="0.0000"${locked ? " disabled" : ""}>
                            <small>${escapeHtml(message)}</small>
                        </label>
                        <div class="dashboard-alert-trigger-field">
                            <span>პირობა</span>
                            <div class="dashboard-alert-trigger-group" role="group" aria-label="Alert trigger">
                                <button type="button" data-alert-operator="lt" class="${alert.operator === "lt" ? "active" : ""}"${locked ? " disabled" : ""}>ნაკლებია</button>
                                <button type="button" data-alert-operator="gt" class="${alert.operator === "gt" ? "active" : ""}"${locked ? " disabled" : ""}>მეტია</button>
                            </div>
                            <small></small>
                        </div>
                        <span class="dashboard-alert-done" aria-label="Alert შესრულებულია">${locked ? "✓" : ""}</span>
                        ${alertMenuHtml(locked || dashboardAlerts.length > 1)}
                    </div>
                `;
            }).join("");
        }

        function closeAlertMenus() {
            document.querySelectorAll(".dashboard-alert-menu.open").forEach(menu => menu.classList.remove("open"));
        }

        function collectAlertPayload(alert) {
            const alertType = alert.alertType || (alert.side === "rate" ? "forex" : "company");
            if (alertType === "forex" || alertType === "crypto" || alertType === "asset") {
                return {
                    alertType,
                    companyKey: "",
                    companyName: ({ crypto: "CRYPTO", asset: "ASSET" }[alertType] || "FOREX"),
                    pair: alert.pair,
                    side: "rate",
                    operator: alert.operator,
                    targetRate: Number(alert.targetRate)
                };
            }

            const company = getAlertCatalogCompany(alert.companyKey);
            return {
                alertType: "company",
                companyKey: alert.companyKey,
                companyName: company?.name || alert.companyName || COMPANY_NAMES_KA[alert.companyKey] || alert.companyKey,
                pair: alert.pair,
                side: alert.side,
                operator: alert.operator,
                targetRate: Number(alert.targetRate)
            };
        }

        function isAlertReady(alert) {
            const payload = collectAlertPayload(alert);
            if (payload.alertType === "forex" || payload.alertType === "crypto" || payload.alertType === "asset") {
                return Boolean(
                    payload.pair &&
                    payload.operator &&
                    Number.isFinite(payload.targetRate) &&
                    payload.targetRate > 0
                );
            }

            return Boolean(
                payload.companyKey &&
                payload.companyName &&
                payload.pair &&
                payload.side &&
                payload.operator &&
                Number.isFinite(payload.targetRate) &&
                payload.targetRate > 0
            );
        }

        function scheduleAlertSave(index) {
            const alert = dashboardAlerts[index];
            if (!alert || alert.status === "triggered" || !isAlertReady(alert)) return;
            clearTimeout(dashboardAlertSaveTimers.get(alert.clientId));
        }

        function updateAlertFilterState() {
            const limitText = document.getElementById("dashboardAlertLimitText");
            const isFull = dashboardAlerts.length >= DASHBOARD_ALERT_MAX;
            document.querySelectorAll("[data-alert-add-type]").forEach(button => {
                button.disabled = isFull;
            });
            if (limitText) {
                limitText.textContent = `${dashboardAlerts.length}/${DASHBOARD_ALERT_MAX} alert`;
            }
        }

        function addDashboardAlert(alertType = "company", insertAfter = dashboardAlerts.length - 1, source = null) {
            if (dashboardAlerts.length >= DASHBOARD_ALERT_MAX) {
                setDashboardStatus("error", `მაქსიმუმ ${DASHBOARD_ALERT_MAX} alert-ის არჩევაა შესაძლებელი`);
                return false;
            }

            const alert = source
                ? {
                    ...source,
                    id: undefined,
                    clientId: `alert-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                    status: "active",
                    triggeredRate: undefined,
                    triggeredAt: undefined
                }
                : createEmptyAlert(alertType);

            dashboardAlerts.splice(insertAfter + 1, 0, alert);
            renderDashboardAlerts();
            updateAlertFilterState();
            return true;
        }

        async function saveDashboardAlert(index) {
            const alert = dashboardAlerts[index];
            if (!alert || !isAlertReady(alert)) return null;
            const method = alert.id ? "PUT" : "POST";
            const url = alert.id
                ? `${dashboardAlertApiOrigin}/api/alerts/${encodeURIComponent(alert.id)}`
                : `${dashboardAlertApiOrigin}/api/alerts`;

            try {
                const res = await fetch(url, {
                    method,
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: `Bearer ${dashboardAlertToken}`
                    },
                    body: JSON.stringify(collectAlertPayload(alert))
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.message || "Alert ვერ შეინახა");
                dashboardAlerts[index] = normalizeLoadedAlert(data.alert);
                renderDashboardAlerts();
                return dashboardAlerts[index];
            } catch (error) {
                console.warn("Alert save failed:", error.message);
                throw new Error(error.message === "Failed to fetch"
                    ? "Alert API-სთან კავშირი ვერ მოხერხდა. გადაამოწმე local backend მუშაობს თუ არა."
                    : error.message || "Alert ვერ შეინახა");
            }
        }

        async function saveDashboardAlerts() {
            const tasks = dashboardAlerts.map((alert, index) => {
                if (!alert || alert.status === "triggered" || !isAlertReady(alert)) return Promise.resolve(null);
                return saveDashboardAlert(index);
            });
            await Promise.all(tasks);
        }

        async function deleteDashboardAlert(index) {
            const alert = dashboardAlerts[index];
            if (!alert || (dashboardAlerts.length <= 1 && alert.status !== "triggered")) return;
            if (alert?.id) {
                await fetch(`${dashboardAlertApiOrigin}/api/alerts/${encodeURIComponent(alert.id)}`, {
                    method: "DELETE",
                    headers: { Authorization: `Bearer ${dashboardAlertToken}` }
                }).catch(() => null);
            }
            dashboardAlerts.splice(index, 1);
            if (!dashboardAlerts.length) dashboardAlerts = [createEmptyAlert()];
            renderDashboardAlerts();
        }

        function bindDashboardAlerts() {
            const list = document.getElementById("dashboardAlertsList");
            if (!list) return;

            list.addEventListener("change", event => {
                const field = event.target.closest("[data-alert-field]");
                if (!field) return;
                const row = field.closest(".dashboard-alert-row");
                const index = Number(row?.dataset.alertIndex);
                const alert = dashboardAlerts[index];
                if (!alert || alert.status === "triggered") return;

                const name = field.dataset.alertField;
                alert[name] = field.value;
                if (name === "companyKey" && alert.alertType === "company") {
                    const company = getAlertCatalogCompany(alert.companyKey);
                    alert.companyName = company?.name || "";
                    alert.pair = company?.pairs?.[0]?.pair || "";
                }
                if (name === "pair") alert.targetRate = alert.targetRate || "";
                renderDashboardAlerts();
                scheduleAlertSave(index);
            });

            list.addEventListener("input", event => {
                const input = event.target.closest('[data-alert-field="targetRate"]');
                if (!input) return;
                const row = input.closest(".dashboard-alert-row");
                const index = Number(row?.dataset.alertIndex);
                if (!dashboardAlerts[index] || dashboardAlerts[index].status === "triggered") return;
                dashboardAlerts[index].targetRate = input.value;
                const message = input.parentElement.querySelector("small");
                if (message) {
                    message.textContent = "";
                    message.classList.remove("dashboard-alert-warning");
                }
                scheduleAlertSave(index);
            });

            list.addEventListener("click", async event => {
                const menuButton = event.target.closest('[data-alert-action="menu"]');
                const duplicateButton = event.target.closest('[data-alert-action="duplicate"]');
                const deleteButton = event.target.closest('[data-alert-action="delete"]');
                const operatorButton = event.target.closest("[data-alert-operator]");
                const row = event.target.closest(".dashboard-alert-row");
                const index = Number(row?.dataset.alertIndex);

                if (menuButton) {
                    event.stopPropagation();
                    const menu = menuButton.closest(".dashboard-alert-menu");
                    const shouldOpen = !menu.classList.contains("open");
                    closeAlertMenus();
                    if (shouldOpen) menu.classList.add("open");
                    return;
                }

                if (duplicateButton && dashboardAlerts[index]) {
                    event.stopPropagation();
                    const source = dashboardAlerts[index];
                    closeAlertMenus();
                    if (addDashboardAlert(source.alertType || "company", index, source)) scheduleAlertSave(index + 1);
                    return;
                }

                if (deleteButton) {
                    event.stopPropagation();
                    closeAlertMenus();
                    if (!deleteButton.disabled) await deleteDashboardAlert(index);
                    updateAlertFilterState();
                    return;
                }

                if (operatorButton && dashboardAlerts[index]?.status !== "triggered") {
                    dashboardAlerts[index].operator = operatorButton.dataset.alertOperator;
                    renderDashboardAlerts();
                    scheduleAlertSave(index);
                }
            });

            document.addEventListener("click", event => {
                if (!event.target.closest(".dashboard-alert-menu")) closeAlertMenus();
            });
        }

        function bindDashboardAlertFilters() {
            document.querySelectorAll("[data-alert-add-type]").forEach(button => {
                button.addEventListener("click", () => {
                    addDashboardAlert(button.dataset.alertAddType || "company");
                });
            });
        }

        async function initDashboardAlerts(apiOrigin, token) {
            dashboardAlertApiOrigin = apiOrigin;
            dashboardAlertToken = token;
            bindDashboardAlerts();
            bindDashboardAlertFilters();

            try {
                const res = await fetch(`${apiOrigin}/api/alerts`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const data = await res.json().catch(() => ({}));
                dashboardAlerts = Array.isArray(data.alerts) && data.alerts.length
                    ? data.alerts.map(normalizeLoadedAlert)
                    : [createEmptyAlert()];
            } catch (_) {
                dashboardAlerts = [createEmptyAlert()];
            }
            if (!dashboardAlertForexCatalog.length) {
                try {
                    dashboardAlertForexCatalog = buildDashboardAlertForexCatalog(await fetchSheetRows());
                } catch (_) {
                    dashboardAlertForexCatalog = [];
                }
            }
            if (!dashboardAlertCryptoCatalog.length) {
                try {
                    const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
                    dashboardAlertCryptoCatalog = buildDashboardAlertCryptoCatalog(await res.json());
                } catch (_) {
                    dashboardAlertCryptoCatalog = [];
                }
            }
            if (!dashboardAlertAssetCatalog.length) {
                try {
                    dashboardAlertAssetCatalog = buildDashboardAlertAssetCatalog(await fetchAssetPrices());
                } catch (_) {
                    dashboardAlertAssetCatalog = [];
                }
            }
            renderDashboardAlerts();
            updateAlertFilterState();
        }

        function bindDashboardSave(apiOrigin, token, user) {
            const saveButton = document.getElementById("saveDashboardBtn");
            if (!saveButton) return;

            saveButton.addEventListener("click", async () => {
                saveButton.disabled = true;
                setDashboardStatus("loading", "ინახება...");

                try {
                    const res = await fetch(`${apiOrigin}/api/dashboard`, {
                        method: "PUT",
                        headers: {
                            "Content-Type": "application/json",
                            Authorization: `Bearer ${token}`
                        },
                        body: JSON.stringify(collectDashboardState())
                    });

                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) throw new Error(data.message || "დეშბორდი ვერ შეინახა");

                    await saveDashboardAlerts();
                    cacheDashboardSnapshot(user);
                    setDashboardStatus("success", "დეშბორდი და alert-ები შენახულია");
                } catch (error) {
                    setDashboardStatus("error", error.message || "დეშბორდი ვერ შეინახა");
                } finally {
                    saveButton.disabled = false;
                }
            });
        }

        function collectDashboardState() {
            const filters = {};
            const items = {};

            DASHBOARD_SLOT_KEYS.forEach(slotKey => {
                filters[slotKey] = Boolean(document.querySelector(`[data-filter-slot="${slotKey}"]`)?.checked);
                items[slotKey] = Array.from(document.querySelectorAll(`[data-slot="${slotKey}"] .dashboard-selected-item`))
                    .map(item => item.dataset.id)
                    .filter(Boolean);
            });

            const order = Array.from(document.querySelectorAll("#dashboardBuilderGrid .dashboard-slot"))
                .map(slot => slot.dataset.slot)
                .filter(Boolean);

            return { filters, items, order };
        }

        async function loadSavedDashboard(apiOrigin, token) {
            const status = document.getElementById("dashboardSaveStatus");
            try {
                const res = await fetch(`${apiOrigin}/api/dashboard`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (!res.ok) return;

                const dashboard = await res.json();
                if (!hasKnownDashboardState(dashboard)) return;
                restoreDashboardFilters(dashboard.filters || {});
                restoreDashboardItems(dashboard.items || {});
                restoreDashboardOrder(dashboard.order || []);
            } catch (error) {
                if (status) setDashboardStatus("error", "შენახული დეშბორდი ვერ ჩაიტვირთა");
            }
        }

        function hasKnownDashboardState(dashboard) {
            const filters = dashboard?.filters || {};
            const items = dashboard?.items || {};
            const order = dashboard?.order || [];
            return DASHBOARD_SLOT_KEYS.some(key => typeof filters[key] === "boolean" || Array.isArray(items[key]))
                || (Array.isArray(order) && order.some(key => DASHBOARD_SLOT_KEYS.includes(key)));
        }

        function restoreDashboardFilters(filters) {
            DASHBOARD_SLOT_KEYS.forEach(slotKey => {
                const input = document.querySelector(`[data-filter-slot="${slotKey}"]`);
                if (input && typeof filters[slotKey] === "boolean") input.checked = filters[slotKey];
            });

            window.updateDashboardVisibleSlots?.();
        }

        function restoreDashboardItems(items) {
            DASHBOARD_SLOT_KEYS.forEach(slotKey => {
                if (!Array.isArray(items[slotKey])) return;
                const slot = document.querySelector(`[data-slot="${slotKey}"]`);
                const selectedItems = slot?.querySelector(".dashboard-slot-items");
                if (!slot || !selectedItems) return;

                selectedItems.innerHTML = "";
                (Array.isArray(items[slotKey]) ? items[slotKey] : []).forEach(itemId => {
                    const row = slot.querySelector(`.dashboard-picker-row[data-id="${cssEscape(itemId)}"]`);
                    if (row) selectedItems.insertAdjacentHTML("beforeend", selectedHtml(row));
                });
            });
        }

        function restoreDashboardOrder(order) {
            if (!Array.isArray(order) || !order.length) return;
            const grid = document.getElementById("dashboardBuilderGrid");
            if (!grid) return;

            order
                .filter(slotKey => DASHBOARD_SLOT_KEYS.includes(slotKey))
                .forEach(slotKey => {
                    const slot = grid.querySelector(`[data-slot="${cssEscape(slotKey)}"]`);
                    if (slot) grid.appendChild(slot);
                });
        }

        function dashboardCacheKey(user) {
            const id = user?.id || user?._id || user?.email || "guest";
            return `allrates-dashboard-cache:${DASHBOARD_CACHE_VERSION}:${id}`;
        }

        function cacheDashboardSnapshot(user) {
            try {
                const snapshot = collectDashboardState();
                snapshot.html = {};

                DASHBOARD_SLOT_KEYS.forEach(slotKey => {
                    snapshot.html[slotKey] = document.querySelector(`[data-slot="${slotKey}"] .dashboard-slot-items`)?.innerHTML || "";
                });

                localStorage.setItem(dashboardCacheKey(user), JSON.stringify(snapshot));
            } catch (error) {
                // Cache is only a UX helper; MongoDB remains the source of truth.
            }
        }

        function restoreDashboardCache(user) {
            try {
                const raw = localStorage.getItem(dashboardCacheKey(user));
                if (!raw) return;

                const snapshot = JSON.parse(raw);
                restoreDashboardFilters(snapshot.filters || {});

                DASHBOARD_SLOT_KEYS.forEach(slotKey => {
                    const selectedItems = document.querySelector(`[data-slot="${slotKey}"] .dashboard-slot-items`);
                    if (selectedItems && snapshot.html?.[slotKey]) selectedItems.innerHTML = snapshot.html[slotKey];
                });
                restoreDashboardOrder(snapshot.order || []);
            } catch (error) {
                localStorage.removeItem(dashboardCacheKey(user));
            }
        }

        function setDashboardStatus(state, message) {
            const status = document.getElementById("dashboardSaveStatus");
            if (!status) return;

            status.dataset.state = state || "";
            status.className = `dashboard-save-status${state ? ` ${state}` : ""}`;

            if (state === "success") {
                status.innerHTML = `
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 6 9 17l-5-5"></path>
                    </svg>
                    <span>${escapeHtml(message)}</span>
                `;
                return;
            }

            status.textContent = message || "";
        }

        function cssEscape(value) {
            if (window.CSS && typeof window.CSS.escape === "function") return window.CSS.escape(value);
            return String(value).replace(/["\\]/g, "\\$&");
        }

        function filterPicker(slot, value) {
            const term = value.toLowerCase().trim();
            const compactTerm = compactSearch(value);
            slot.querySelectorAll(".dashboard-picker-row").forEach(row => {
                const searchText = (row.dataset.search || "").toLowerCase();
                const compactText = compactSearch(searchText);
                const isMatch = !term || searchText.includes(term) || compactText.includes(compactTerm);
                row.style.display = isMatch ? "" : "none";
            });
        }

        function compactSearch(value) {
            return String(value || "").toLowerCase().replace(/[\s/_-]+/g, "");
        }

        function dashboardItemId(...parts) {
            return parts.map(part => compactSearch(part)).join(":");
        }

        function sortCryptoTickers(a, b) {
            const priority = { BTCUSDT: 1, ETHUSDT: 2 };
            if (priority[a.symbol] || priority[b.symbol]) return (priority[a.symbol] || 999) - (priority[b.symbol] || 999);
            return Number(b.quoteVolume) - Number(a.quoteVolume);
        }

        function cryptoLogo(symbol) {
            return CRYPTO_LOGOS[symbol] || `https://assets.coincap.io/assets/icons/${symbol.toLowerCase()}@2x.png`;
        }

        function closeItemMenus() {
            document.querySelectorAll(".dashboard-item-menu.open").forEach(menu => menu.classList.remove("open"));
        }

        function bindPickerRows(list) {
            list.querySelectorAll(".dashboard-picker-row").forEach(row => {
                row.addEventListener("click", () => {
                    const slot = row.closest(".dashboard-slot");
                    const items = slot.querySelector(".dashboard-slot-items");
                    const picker = slot.querySelector(".dashboard-picker");
                    const existing = items.querySelector(`.dashboard-selected-item[data-id="${cssEscape(row.dataset.id || "")}"]`);
                    if (existing) {
                        picker.hidden = true;
                        return;
                    }
                    items.insertAdjacentHTML("beforeend", selectedHtml(row));
                    picker.hidden = true;
                });
            });
        }

        function refreshSelectedItemsFromPicker(slotKey) {
            const slot = document.querySelector(`[data-slot="${slotKey}"]`);
            const items = slot?.querySelector(".dashboard-slot-items");
            if (!slot || !items) return;

            Array.from(items.querySelectorAll(".dashboard-selected-item")).forEach(item => {
                const row = slot.querySelector(`.dashboard-picker-row[data-id="${cssEscape(item.dataset.id || "")}"]`);
                if (row) item.outerHTML = selectedHtml(row);
            });
        }

        async function fetchSheetRows() {
            const res = await fetch(`${ASSETS_API_URL}?t=${Date.now()}`, { cache: "no-store" });
            if (!res.ok) throw new Error("Sheets API unavailable");
            const raw = await res.json();
            if (raw.data && Array.isArray(raw.data)) {
                const headers = raw.data[0] || [];
                return raw.data.slice(1).map(row => {
                    const obj = {};
                    headers.forEach((header, index) => obj[header] = row[index]);
                    return obj;
                });
            }
            return Array.isArray(raw) ? raw : [];
        }

        async function loadCompanyPicker(apiOrigin) {
            try {
                await ensureDashboardOfficialRates();
                const data = await fetchJsonWithFallback([
                    `${apiOrigin}/api/rates/latest`,
                    "https://allrates-backend-api.onrender.com/api/rates/latest"
                ]);
                const rowsByCurrency = Object.fromEntries(Object.keys(CURRENCY_CONFIG).map(currency => [currency, []]));
                dashboardAlertCatalog = buildDashboardAlertCatalog(data);

                data.forEach(item => {
                    const key = companyKey(item);
                    const name = COMPANY_NAMES_KA[key] || item.company || item.Company || key;
                    const rawName = item.company || item.Company || key;
                    const logo = COMPANY_LOGOS[key] || "Logos/logo.jpg";

                    Object.entries(CURRENCY_CONFIG).forEach(([currency, pairConfig]) => {
                        const buy = readNumber(item, pairConfig.buy);
                        const sell = readNumber(item, pairConfig.sell);
                        if (!buy && !sell) return;
                        const buyText = buy ? buy.toFixed(pairConfig.digits) : "-";
                        const sellText = sell ? sell.toFixed(pairConfig.digits) : "-";
                        const spread = buy && sell ? sell - buy : null;
                        const isOutlier = isDashboardRateOutlier(item, currency);
                        rowsByCurrency[currency].push({
                            id: dashboardItemId("company", rawName, pairConfig.pair),
                            kind: "company",
                            title: name,
                            subtitle: pairConfig.pair,
                            selectedTitle: name,
                            search: `${name} ${rawName} ${key} ${pairConfig.pair}`,
                            buy: buyText,
                            sell: sellText,
                            spread: spread ? spread.toFixed(pairConfig.digits) : "-",
                            rate: `${buyText} / ${sellText}`,
                            isOutlier,
                            sortSpread: Number.isFinite(spread) ? spread : Infinity,
                            logoHtml: `<span class="dashboard-logo"><img src="${logo}" alt="${escapeHtml(name)}" onerror="this.onerror=null;this.src='Logos/logo.jpg';"></span>`
                        });
                    });
                });

                Object.entries(rowsByCurrency).forEach(([currency, rows]) => {
                    const list = document.getElementById(`company-${currency}PickerList`);
                    if (!list) return;
                    rows.sort((a, b) => {
                        if (a.isOutlier !== b.isOutlier) return a.isOutlier ? 1 : -1;
                        return a.sortSpread - b.sortSpread;
                    });
                    list.innerHTML = rows.length ? rows.map(rowHtml).join("") : "კომპანიების კურსები ვერ მოიძებნა";
                    bindPickerRows(list);
                });
                loadMarketPicker(data);
            } catch (error) {
                Object.keys(CURRENCY_CONFIG).forEach(currency => {
                    const list = document.getElementById(`company-${currency}PickerList`);
                    if (list) list.textContent = "კომპანიების სიის ჩატვირთვა ვერ მოხერხდა";
                });
            }
        }

        function loadMarketPicker(data) {
            const list = document.getElementById("marketPickerList");
            if (!list) return;

            const rows = Object.entries(CURRENCY_CONFIG).map(([currency, config]) => {
                const validItems = data.map(item => {
                    const buy = readNumber(item, config.buy);
                    const sell = readNumber(item, config.sell);
                    const spread = buy && sell ? sell - buy : Number(item[config.spread]);
                    return { buy, sell, spread, isOutlier: isDashboardRateOutlier(item, currency) };
                }).filter(item => Number.isFinite(item.buy) && Number.isFinite(item.sell) && Number.isFinite(item.spread) && item.spread > 0);
                const relevantItems = validItems.filter(item => !item.isOutlier);

                relevantItems.sort((a, b) => a.spread - b.spread);
                const topItems = relevantItems.slice(0, 10);
                const count = topItems.length;
                const avgBuy = count ? topItems.reduce((sum, item) => sum + item.buy, 0) / count : null;
                const avgSell = count ? topItems.reduce((sum, item) => sum + item.sell, 0) / count : null;
                const avgSpread = Number.isFinite(avgBuy) && Number.isFinite(avgSell) ? avgSell - avgBuy : null;

                return {
                    id: `market:${currency}`,
                    kind: "market",
                    title: `${config.code}/GEL`,
                    subtitle: "საბაზრო საშუალო",
                    selectedTitle: `${config.code}/GEL`,
                    search: `${config.code} ${config.title} ${config.pair} საბაზრო`,
                    buy: Number.isFinite(avgBuy) ? avgBuy.toFixed(config.digits) : "-",
                    sell: Number.isFinite(avgSell) ? avgSell.toFixed(config.digits) : "-",
                    spread: Number.isFinite(avgSpread) ? avgSpread.toFixed(config.digits) : "-",
                    rate: ""
                };
            });

            list.innerHTML = rows.map(rowHtml).join("");
            bindPickerRows(list);
            refreshSelectedItemsFromPicker("market");
        }

        async function loadOfficialPicker() {
            const list = document.getElementById("officialPickerList");
            if (!list) return;

            try {
                const res = await fetch(`${NBG_API_URL}?t=${Date.now()}`, { cache: "no-store" });
                if (!res.ok) throw new Error("NBG API unavailable");
                const data = await res.json();
                const currencies = data?.[0]?.currencies || [];
                const rows = currencies
                    .filter(item => item?.code && Number.isFinite(Number(item.rate)))
                    .map(item => {
                        const rate = Number(item.rate);
                        const quantity = Number(item.quantity) || 1;
                        const rateText = rate.toFixed((item.code === "USD" || item.code === "EUR" || item.code === "GBP") ? 3 : 4);
                        return {
                            id: dashboardItemId("official", item.code),
                            kind: "official",
                            title: `${item.code} / GEL`,
                            subtitle: `${quantity} ერთეული · ${item.name || "ეროვნული ბანკი"}`,
                            selectedTitle: `${item.code} / GEL`,
                            search: `${item.code} ${item.name || ""} ეროვნული ბანკი ოფიციალური`,
                            buy: rateText,
                            sell: rateText,
                            spread: "0.000",
                            rate: ""
                        };
                    });

                list.innerHTML = rows.length ? rows.map(rowHtml).join("") : "ოფიციალური კურსები ვერ მოიძებნა";
                bindPickerRows(list);
                refreshSelectedItemsFromPicker("official");
            } catch (error) {
                list.textContent = "ოფიციალური კურსების ჩატვირთვა ვერ მოხერხდა";
            }
        }

        async function loadForexPicker() {
            const list = document.getElementById("forexPickerList");
            try {
                const sheetRows = await fetchSheetRows();
                dashboardAlertForexCatalog = buildDashboardAlertForexCatalog(sheetRows);
                const pairColumns = [
                    ["Pair (Popular)", "Rate (Popular)"],
                    ["Pair (vs USD)", "Rate (vs USD)"],
                    ["Pair (vs EUR)", "Rate (vs EUR)"],
                    ["Pair (vs GBP)", "Rate (vs GBP)"],
                    ["Pair (vs CHF)", "Rate (vs CHF)"]
                ];
                const rateMap = new Map();
                sheetRows.forEach(row => {
                    pairColumns.forEach(([pairKey, rateKey]) => {
                        const pair = String(row[pairKey] || "").trim().toUpperCase();
                        const rate = Number(row[rateKey]);
                        if (pair && Number.isFinite(rate)) rateMap.set(pair, rate);
                    });
                });

                const orderedPairs = [
                    ...FOREX_PAIRS,
                    ...Array.from(rateMap.keys()).filter(pair => !FOREX_PAIRS.includes(pair))
                ];
                const rows = orderedPairs.map(pair => {
                    const base = pair.slice(0, 3);
                    const quote = pair.slice(3, 6);
                    const value = rateMap.get(pair);
                    return {
                        id: dashboardItemId("forex", pair),
                        kind: "forex",
                        title: pair,
                        subtitle: `${base}/${quote}`,
                        search: `${pair} ${base} ${quote}`,
                        rate: Number.isFinite(value) ? value.toFixed(4) : "—",
                        logoHtml: forexLogo(pair)
                    };
                }).filter(row => row.rate !== "—");
                list.innerHTML = rows.map(rowHtml).join("");
                bindPickerRows(list);
                refreshSelectedItemsFromPicker("forex");
            } catch (error) {
                list.textContent = "Forex სიის ჩატვირთვა ვერ მოხერხდა";
            }
        }

        async function loadCryptoPicker() {
            const list = document.getElementById("cryptoPickerList");
            try {
                const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
                const data = await res.json();
                dashboardAlertCryptoCatalog = buildDashboardAlertCryptoCatalog(data);
                const rows = data
                    .filter(item => item.symbol.endsWith("USDT") && !item.symbol.includes("UPUSDT") && !item.symbol.includes("DOWNUSDT") && !item.symbol.includes("BULLUSDT") && !item.symbol.includes("BEARUSDT"))
                    .sort(sortCryptoTickers)
                    .slice(0, 100)
                    .map(item => {
                        const symbol = item.symbol.replace("USDT", "");
                        const name = CRYPTO_NAMES[symbol] || symbol;
                        const price = Number(item.lastPrice);
                        return {
                            id: dashboardItemId("crypto", item.symbol),
                            kind: "crypto",
                            title: `${name} (${symbol})`,
                            subtitle: item.symbol.replace("USDT", "/USDT"),
                            search: `${name} ${symbol} ${item.symbol}`,
                            rate: Number.isFinite(price) ? `$ ${price.toLocaleString("en-US", { maximumFractionDigits: price > 1 ? 2 : 6 })}` : "—",
                            logoHtml: `<span class="dashboard-logo"><img src="${cryptoLogo(symbol)}" alt="${name}" onerror="this.onerror=null;this.src='Logos/logo.jpg';"></span>`
                        };
                    });
                list.innerHTML = rows.map(rowHtml).join("");
                bindPickerRows(list);
            } catch (error) {
                list.textContent = "კრიპტოს სიის ჩატვირთვა ვერ მოხერხდა";
            }
        }

        async function loadAssetPicker() {
            const list = document.getElementById("assetPickerList");
            const priceMap = await fetchAssetPrices();
            dashboardAlertAssetCatalog = buildDashboardAlertAssetCatalog(priceMap);
            const rows = ASSET_ITEMS.map(item => {
                const price = priceMap.get(item.name.toLowerCase()) || item.value;
                return {
                    id: dashboardItemId("asset", item.name),
                    kind: "asset",
                    title: item.name,
                    subtitle: "პოპულარული აქტივი",
                    search: `${item.name} ${(item.aliases || []).join(" ")}`,
                    rate: price,
                    logoHtml: `<span class="dashboard-logo"><img src="${item.logo}" alt="${item.name}" onerror="this.onerror=null;this.src='Logos/logo.jpg';"></span>`
                };
            });
            list.innerHTML = rows.map(rowHtml).join("");
            bindPickerRows(list);
        }

        async function fetchAssetPrices() {
            const prices = new Map();
            try {
                const rows = await fetchSheetRows();
                rows.forEach(row => {
                    const name = String(row.MEA || "").trim();
                    const value = parseDisplayNumber(row["Rate (MEA)"]);
                    if (name && !Number.isNaN(value)) prices.set(name.toLowerCase(), value.toLocaleString("en-US", { maximumFractionDigits: 3 }));
                });
            } catch (error) {
                return prices;
            }
            return prices;
        }
    </script>
