<script>
    let allRates = [];
    let fpInstance = null;

    async function fetchOfficialRates(dateStr = '') {
        try {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('loader').innerHTML = '⏳ მონაცემები იტვირთება...';
            document.getElementById('tableWrapper').style.display = 'none';
            
            let url = 'https://nbg.gov.ge/gw/api/ct/monetarypolicy/currencies/ka/json/';
            if (dateStr) {
                url += `?date=${dateStr}`;
            }

            const res = await fetch(url);
            const data = await res.json();
            
            if (data && data.length > 0) {
                const latest = data[0];
                allRates = latest.currencies;
                
                // Sort to put USD, EUR, GBP, RUB first, then alphabetical
                const priority = { 'USD': 1, 'EUR': 2, 'GBP': 3, 'RUB': 4 };
                allRates.sort((a, b) => {
                    const pA = priority[a.code] || 99;
                    const pB = priority[b.code] || 99;
                    if (pA !== pB) return pA - pB;
                    return a.code.localeCompare(b.code);
                });
                
                // Format date nicely for the label
                const dateObj = new Date(latest.date);
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                document.getElementById('dateLabel').innerHTML = `კურსები მოქმედებს:<br><b>${dateObj.toLocaleDateString('ka-GE', options)}</b>`;
                
                // Update picker silently if it wasn't a user pick
                if (!dateStr && fpInstance) {
                    fpInstance.setDate(dateObj, false);
                }

                // If user typed in search box already, keep filter applied
                const term = document.getElementById('searchInput').value.toLowerCase().trim();
                if (term) {
                    const filtered = allRates.filter(item => {
                        return item.code.toLowerCase().includes(term) || 
                               item.name.toLowerCase().includes(term);
                    });
                    renderTable(filtered);
                } else {
                    renderTable(allRates);
                }
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('tableWrapper').style.display = 'block';
            } else {
                document.getElementById('loader').innerHTML = '❌ ამ თარიღზე მონაცემები არ მოიძებნა.';
            }
        } catch (error) {
            console.error("Error fetching NBG rates:", error);
            document.getElementById('loader').innerHTML = '❌ მონაცემების ჩატვირთვა ვერ მოხერხდა.';
        }
    }

    function renderTable(rates) {
        const tbody = document.getElementById('ratesBody');
        tbody.innerHTML = '';
        
        if (rates.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 30px; color: var(--text-muted);">ვერაფერი მოიძებნა</td></tr>';
            return;
        }

        rates.forEach(item => {
            const tr = document.createElement('tr');
            
            // Format Diff
            let diffClass = 'diff-none';
            let diffIcon = '';
            let diffText = '0.0000';
            
            if (item.diff > 0) {
                diffClass = 'diff-up';
                diffIcon = '&#9650;'; // Up arrow
                diffText = item.diffFormated;
            } else if (item.diff < 0) {
                diffClass = 'diff-down';
                diffIcon = '&#9660;'; // Down arrow
                diffText = item.diffFormated;
            }

            // Flag URL using flagcdn
            const countryCode = item.code.substring(0, 2).toLowerCase();
            const flagUrl = `https://flagcdn.com/w40/${countryCode}.png`;

            // Handle special flags (like EUR -> EU, BTC, etc if NBG ever added them)
            let finalFlagUrl = flagUrl;
            if (item.code === 'EUR') finalFlagUrl = 'https://flagcdn.com/w40/eu.png';

            tr.innerHTML = `
                <td>
                    <div class="code-cell">
                        <img src="${finalFlagUrl}" alt="${item.code}" class="currency-flag" onerror="this.style.display='none'">
                        <span>${item.code}</span>
                    </div>
                </td>
                <td>
                    <span class="currency-name">${item.name}</span>
                    ${item.quantity > 1 ? `<span class="quantity-badge">${item.quantity} ერთეული</span>` : ''}
                </td>
                <td>
                    <span class="rate-cell">${item.rateFormated}</span>
                </td>
                <td>
                    <span class="diff-cell ${diffClass}">
                        <span>${diffIcon}</span>
                        <span>${diffText}</span>
                    </span>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        if (!term) {
            renderTable(allRates);
            return;
        }
        
        const filtered = allRates.filter(item => {
            return item.code.toLowerCase().includes(term) || 
                   item.name.toLowerCase().includes(term);
        });
        renderTable(filtered);
    });

    // Initialize Calendar and Fetch
    const script1 = document.createElement('script');
    script1.src = "https://cdn.jsdelivr.net/npm/flatpickr";
    script1.onload = () => {
        const script2 = document.createElement('script');
        script2.src = "https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ka.js";
        script2.onload = () => {
            fpInstance = flatpickr("#datePicker", {
                locale: "ka",
                dateFormat: "Y-m-d",
                maxDate: "today",
                onChange: function(selectedDates, dateStr, instance) {
                    fetchOfficialRates(dateStr);
                }
            });
            fetchOfficialRates();
        };
        document.body.appendChild(script2);
    };
    document.body.appendChild(script1);
</script>

<script src="js/footer.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const today = new Date();
        const firstDayOfYear = new Date(today.getFullYear(), 0, 1);
        
        // Formating to YYYY-MM-DD taking into account local timezone issues
        const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };
        
        document.getElementById('exportDateFrom').value = formatDate(firstDayOfYear);
        document.getElementById('exportDateTo').value = formatDate(today);
        
        

        document.getElementById('exportBtn').addEventListener('click', async function() {
            const currency = document.getElementById('exportCurrency').value;
            const fromDateStr = document.getElementById('exportDateFrom').value;
            const toDateStr = document.getElementById('exportDateTo').value;
            const statusEl = document.getElementById('exportStatus');
            const btn = document.getElementById('exportBtn');
            
            if (!fromDateStr || !toDateStr) {
                alert("გთხოვთ აირჩიოთ ორივე თარიღი.");
                return;
            }

            const fromDate = new Date(fromDateStr);
            const toDate = new Date(toDateStr);
            
            if (fromDate > toDate) {
                alert("საწყისი თარიღი არ შეიძლება იყოს საბოლოო თარიღზე გვიან.");
                return;
            }

            const diffTime = Math.abs(toDate - fromDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            if (diffDays > 365) {
                alert("მაქსიმალური დიაპაზონი შეზღუდულია 1 წლით (365 დღე).");
                return;
            }
            
            const datesToFetch = [];
            let currDate = new Date(fromDate);
            while (currDate <= toDate) {
                datesToFetch.push(currDate.toISOString().split('T')[0]);
                currDate.setDate(currDate.getDate() + 1);
            }

            btn.disabled = true;
            btn.style.opacity = '0.7';
            statusEl.style.display = 'block';
            statusEl.style.color = 'var(--text-muted)';
            statusEl.innerText = `მონაცემების ჩამოტვირთვა... 0 / ${datesToFetch.length}`;

            const results = [];
            let completed = 0;
            let hasError = false;

            const batchSize = 20;
            for (let i = 0; i < datesToFetch.length; i += batchSize) {
                const batch = datesToFetch.slice(i, i + batchSize);
                
                const promises = batch.map(dateStr => {
                    return fetch(`https://nbg.gov.ge/gw/api/ct/monetarypolicy/currencies/ka/json/?date=${dateStr}`)
                        .then(res => {
                            if (!res.ok) throw new Error("API Error");
                            return res.json();
                        })
                        .then(data => {
                            if (data && data.length > 0 && data[0].currencies) {
                                const c = data[0].currencies.find(x => x.code === currency);
                                if (c) {
                                    results.push({
                                        'თარიღი': dateStr,
                                        'კურსი': c.rate,
                                        'რაოდენობა': c.quantity,
                                        'ცვლილება': c.diffFormated
                                    });
                                }
                            }
                            completed++;
                            statusEl.innerText = `მონაცემების ჩამოტვირთვა... ${completed} / ${datesToFetch.length}`;
                        })
                        .catch(err => {
                            hasError = true;
                        });
                });
                
                await Promise.all(promises);
            }

            if (results.length === 0) {
                statusEl.style.color = '#ef4444';
                statusEl.innerText = hasError ? "შეცდომა სერვერიდან." : "მონაცემები ვერ მოიძებნა.";
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            results.sort((a, b) => new Date(a['თარიღი']) - new Date(b['თარიღი']));

            try {
                const worksheet = XLSX.utils.json_to_sheet(results);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, `${currency}_Rates`);
                XLSX.writeFile(workbook, `NBG_${currency}_${fromDateStr}_to_${toDateStr}.xlsx`);
                
                statusEl.style.color = '#10b981';
                statusEl.innerText = "ექსპორტი წარმატებით დასრულდა!";
            } catch (e) {
                statusEl.style.color = '#ef4444';
                statusEl.innerText = "შეცდომა ექსპორტის დროს.";
            }

            btn.disabled = false;
            btn.style.opacity = '1';
        });
    });
</script>
