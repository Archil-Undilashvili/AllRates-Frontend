<script>
    const NBG_API_URL = 'https://nbg.gov.ge/gw/api/ct/monetarypolicy/currencies/ka/json/';
    const DEFAULT_CODES = ['USD', 'EUR', 'GBP', 'CHF', 'RUB'];
    const MAX_SELECTED_CODES = 5;
    const PERIODS = {
        '1w': { label: '1 კვირა', days: 7, step: 1 },
        '1m': { label: '1 თვე', months: 1, step: 1 },
        '3m': { label: '3 თვე', months: 3, step: 3 },
        '1y': { label: '1 წელი', months: 12, step: 7 },
        '5y': { label: '5 წელი', months: 60, step: 30 }
    };
    const FLAG_MAP = {
        AED: 'ae', AMD: 'am', AUD: 'au', AZN: 'az', BRL: 'br', BYN: 'by', CAD: 'ca',
        CHF: 'ch', CNY: 'cn', CZK: 'cz', DKK: 'dk', EGP: 'eg', EUR: 'eu', GBP: 'gb',
        HKD: 'hk', HUF: 'hu', ILS: 'il', INR: 'in', IRR: 'ir', ISK: 'is', JPY: 'jp',
        KGS: 'kg', KRW: 'kr', KWD: 'kw', KZT: 'kz', MDL: 'md', NOK: 'no', NZD: 'nz',
        PLN: 'pl', QAR: 'qa', RON: 'ro', RSD: 'rs', RUB: 'ru', SEK: 'se', SGD: 'sg',
        TJS: 'tj', TMT: 'tm', TRY: 'tr', UAH: 'ua', USD: 'us', UZS: 'uz', ZAR: 'za'
    };
    const COLORS = ['#38bdf8', '#34d399'];
    const pageState = { days: [], selectedCodes: [...DEFAULT_CODES], allCurrencies: [] };
    const chartState = { period: '1m', chart: null, cache: {} };

    function formatApiDate(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function formatPrettyDate(dateLike) {
        const date = typeof dateLike === 'string' ? new Date(`${dateLike.split('T')[0]}T00:00:00`) : dateLike;
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
    }

    function getRateForCode(currencies, code) {
        const item = currencies.find(currency => currency.code === code);
        if (!item) return null;
        return Number(item.rate) / Number(item.quantity || 1);
    }

    function parsePair(pair) {
        const normalized = normalizePair(pair);
        return { base: normalized.slice(0, 3), quote: normalized.slice(3, 6) };
    }

    function normalizePair(pair) {
        return String(pair || '').replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 6);
    }

    function formatPairLabel(pair) {
        const normalized = normalizePair(pair);
        return normalized.length === 6 ? `${normalized.slice(0, 3)}/${normalized.slice(3)}` : normalized;
    }

    function pairValue(pair, rates) {
        const { base, quote } = parsePair(pair);
        if (quote === 'GEL') return rates[base] || null;
        if (!rates[base] || !rates[quote]) return null;
        return rates[base] / rates[quote];
    }

    async function fetchNbgDate(dateStr) {
        const res = await fetch(`${NBG_API_URL}?date=${dateStr}`);
        if (!res.ok) return null;
        const data = await res.json();
        const row = data?.[0];
        if (!row?.currencies?.length) return null;
        const rates = { GEL: 1 };
        row.currencies.forEach(currency => {
            const rate = Number(currency.rate);
            const quantity = Number(currency.quantity || 1);
            if (currency.code && Number.isFinite(rate) && quantity) rates[currency.code] = rate / quantity;
        });
        return {
            date: row.validFromDate || row.date || dateStr,
            dateKey: (row.validFromDate || row.date || dateStr).split('T')[0],
            currencies: row.currencies,
            rates
        };
    }

    async function getRecentNbgDays(count, anchorDate = new Date()) {
        const results = [];
        const seen = new Set();
        const cursor = new Date(anchorDate);
        for (let i = 0; results.length < count && i < 30; i++) {
            const row = await fetchNbgDate(formatApiDate(cursor));
            if (row && !seen.has(row.dateKey)) {
                seen.add(row.dateKey);
                results.push(row);
            }
            cursor.setDate(cursor.getDate() - 1);
        }
        return results;
    }

    function flagUrl(code) {
        const country = FLAG_MAP[code] || code.slice(0, 2).toLowerCase();
        return `https://flagcdn.com/w40/${country}.png`;
    }

    function sortCurrencies(currencies) {
        const priority = [...DEFAULT_CODES, 'TRY'];
        return [...currencies].sort((a, b) => {
            const pa = priority.indexOf(a.code);
            const pb = priority.indexOf(b.code);
            if (pa !== -1 || pb !== -1) return (pa === -1 ? 999 : pa) - (pb === -1 ? 999 : pb);
            return a.code.localeCompare(b.code);
        });
    }

    function renderCurrencyCheckboxes(currencies) {
        const wrap = document.getElementById('official-currency-checks');
        pageState.allCurrencies = sortCurrencies(currencies);
        wrap.innerHTML = pageState.allCurrencies.map(currency => `
            <label class="official-currency-option" title="${currency.name}">
                <input type="checkbox" value="${currency.code}" ${pageState.selectedCodes.includes(currency.code) ? 'checked' : ''}>
                <img src="${flagUrl(currency.code)}" alt="${currency.code}" onerror="this.style.display='none'">
                <span>${currency.code} - ${currency.name}</span>
            </label>
        `).join('');
        updateCurrencySummary();

        wrap.querySelectorAll('input[type="checkbox"]').forEach(input => {
            input.addEventListener('change', () => {
                const checked = [...wrap.querySelectorAll('input:checked')].map(item => item.value);
                if (checked.length > MAX_SELECTED_CODES) {
                    input.checked = false;
                    document.getElementById('official-currency-help').textContent = 'მაქსიმუმ 5 კურსის მონიშვნა შეგიძლია.';
                    return;
                }
                pageState.selectedCodes = checked;
                document.getElementById('official-currency-help').textContent = 'ერთდროულად შეგიძლია მონიშნო მაქსიმუმ 5 კურსი.';
                updateCurrencySummary();
                renderHistoryCards(pageState.days);
            });
        });
    }

    function updateCurrencySummary() {
        const summary = document.getElementById('official-currency-summary');
        if (!summary) return;
        summary.textContent = pageState.selectedCodes.length
            ? pageState.selectedCodes.join(', ')
            : 'აირჩიე კურსები';
    }

    function initCurrencyDropdown() {
        const dropdown = document.getElementById('official-currency-dropdown');
        const button = document.getElementById('official-currency-dropdown-btn');
        if (!dropdown || !button) return;
        button.addEventListener('click', () => dropdown.classList.toggle('open'));
        document.addEventListener('click', event => {
            if (!event.target.closest('#official-currency-dropdown')) dropdown.classList.remove('open');
        });
    }

    function renderHistoryCards(days) {
        const grid = document.getElementById('official-history-grid');
        const latest = days[0];
        document.getElementById('official-detail-date').textContent = latest ? `(${formatPrettyDate(latest.dateKey)})` : '';

        grid.innerHTML = pageState.selectedCodes.map(code => {
            const rows = days.map(day => {
                const value = getRateForCode(day.currencies, code);
                return `
                    <div class="official-history-row">
                        <span>${formatPrettyDate(day.dateKey)}</span>
                        <span>${value ? value.toFixed(4) : '--'}</span>
                    </div>
                `;
            }).join('');
            return `
                <article class="official-history-card" onclick="window.location.href='/official'">
                    <div class="official-history-title">
                        <img src="${flagUrl(code)}" alt="${code}" onerror="this.style.display='none'">
                        <span>${code}/GEL</span>
                    </div>
                    <div class="official-history-list">${rows}</div>
                </article>
            `;
        }).join('');
    }

    function sampleDates(periodKey) {
        const config = PERIODS[periodKey] || PERIODS['1m'];
        const end = new Date();
        const start = new Date();
        if (config.days) start.setDate(start.getDate() - config.days);
        else start.setMonth(start.getMonth() - config.months);
        const dates = [];
        for (const cursor = new Date(start); cursor <= end; cursor.setDate(cursor.getDate() + config.step)) {
            dates.push(formatApiDate(cursor));
        }
        const today = formatApiDate(end);
        if (dates[dates.length - 1] !== today) dates.push(today);
        return dates;
    }

    async function loadChartPoints(periodKey) {
        if (chartState.cache[periodKey]) return chartState.cache[periodKey];
        const rows = await Promise.all(sampleDates(periodKey).map(fetchNbgDate));
        const seen = new Set();
        const points = rows
            .filter(Boolean)
            .filter(row => {
                if (seen.has(row.dateKey)) return false;
                seen.add(row.dateKey);
                return true;
            })
            .sort((a, b) => a.dateKey.localeCompare(b.dateKey));
        chartState.cache[periodKey] = points;
        return points;
    }

    const chartLabelPlugin = {
        id: 'officialPointLabels',
        afterDatasetsDraw(chart) {
            const { ctx } = chart;
            ctx.save();
            ctx.font = '700 11px Inter, sans-serif';
            ctx.textAlign = 'center';
            chart.data.datasets.forEach((dataset, datasetIndex) => {
                const values = dataset.data.filter(value => Number.isFinite(value));
                if (!values.length) return;
                const min = Math.min(...values);
                const max = Math.max(...values);
                const meta = chart.getDatasetMeta(datasetIndex);
                const labelIndexes = new Set();
                dataset.data.forEach((value, index) => {
                    if (value === min || value === max) labelIndexes.add(index);
                });
                const candidates = [0, dataset.data.length - 1, Math.floor(dataset.data.length / 3), Math.floor(dataset.data.length * 2 / 3), Math.floor(dataset.data.length / 2)];
                candidates.forEach(index => {
                    if (Number.isFinite(dataset.data[index])) labelIndexes.add(index);
                });
                dataset.data.forEach((value, index) => {
                    if (!labelIndexes.has(index) || !Number.isFinite(value)) return;
                    const point = meta.data[index];
                    if (!point) return;
                    ctx.fillStyle = dataset.borderColor;
                    ctx.fillText(Number(value).toFixed(4), point.x, point.y - 8);
                });
            });
            ctx.restore();
        }
    };

    function getSelectedPairs() {
        const primaryInput = document.getElementById('official-primary-pair');
        const secondaryInput = document.getElementById('official-secondary-pair');
        const compare = document.getElementById('official-compare-toggle').checked;
        const primary = normalizePair(primaryInput.value || 'USDGEL');
        const secondary = normalizePair(secondaryInput.value || 'EURUSD');
        primaryInput.value = primary || 'USDGEL';
        secondaryInput.value = secondary || 'EURUSD';
        return compare ? [primary || 'USDGEL', secondary || 'EURUSD'] : [primary || 'USDGEL'];
    }

    function validatePairs(pairs, points) {
        return pairs.filter(pair => {
            if (pair.length !== 6) return false;
            return points.some(point => pairValue(pair, point.rates));
        });
    }

    function makeChartConfig(points, pairs) {
        return {
            type: 'line',
            data: {
                labels: points.map(point => formatPrettyDate(point.dateKey)),
                datasets: pairs.map((pair, index) => ({
                    label: formatPairLabel(pair),
                    data: points.map(point => {
                        const value = pairValue(pair, point.rates);
                        return value ? Number(value.toFixed(4)) : null;
                    }),
                    borderColor: COLORS[index % COLORS.length],
                    backgroundColor: `${COLORS[index % COLORS.length]}22`,
                    borderWidth: 2,
                    yAxisID: index === 0 ? 'y' : 'y1',
                    pointRadius: 1.5,
                    pointHoverRadius: 4,
                    tension: 0.32,
                    spanGaps: true
                }))
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { labels: { color: '#cbd5e1', font: { weight: 800 } } },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: ${Number(ctx.raw).toFixed(4)}`
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 7 }, grid: { color: 'rgba(148, 163, 184, 0.12)' } },
                    y: {
                        position: 'left',
                        ticks: { color: COLORS[0], callback: value => Number(value).toFixed(3) },
                        grid: { color: 'rgba(148, 163, 184, 0.12)' }
                    },
                    y1: {
                        display: pairs.length > 1,
                        position: 'right',
                        ticks: { color: COLORS[1], callback: value => Number(value).toFixed(3) },
                        grid: { drawOnChartArea: false }
                    }
                }
            },
            plugins: [chartLabelPlugin]
        };
    }

    async function renderChart() {
        const loader = document.getElementById('official-main-loading');
        const canvas = document.getElementById('official-main-chart');
        const error = document.getElementById('official-chart-error');
        loader.style.display = 'flex';
        error.textContent = '';
        const points = await loadChartPoints(chartState.period);
        const requestedPairs = getSelectedPairs();
        const pairs = validatePairs(requestedPairs, points);
        if (!pairs.length) {
            error.textContent = 'არჩეული სავალუტო წყვილი ვერ მოიძებნა.';
            loader.style.display = 'none';
            return;
        }
        if (pairs.length < requestedPairs.length) {
            error.textContent = 'ერთი სავალუტო წყვილი ვერ მოიძებნა და გრაფიკში არ აისახა.';
        }
        if (chartState.chart) chartState.chart.destroy();
        chartState.chart = new Chart(canvas, makeChartConfig(points, pairs));
        loader.style.display = 'none';
    }

    function initTabs() {
        const container = document.querySelector('[data-chart-tabs="main"]');
        container.innerHTML = Object.entries(PERIODS).map(([key, period]) => `
            <button type="button" class="official-chart-tab ${key === chartState.period ? 'active' : ''}" data-period="${key}">${period.label}</button>
        `).join('');
        container.addEventListener('click', event => {
            const button = event.target.closest('.official-chart-tab');
            if (!button) return;
            chartState.period = button.dataset.period;
            container.querySelectorAll('.official-chart-tab').forEach(tab => tab.classList.toggle('active', tab === button));
            renderChart();
        });
    }

    function initPairControls() {
        const primary = document.getElementById('official-primary-pair');
        const secondary = document.getElementById('official-secondary-pair');
        const toggle = document.getElementById('official-compare-toggle');
        const secondaryWrap = document.getElementById('official-second-pair-wrap');
        const rerender = () => renderChart();
        [primary, secondary].forEach(input => {
            input.addEventListener('input', () => {
                input.value = normalizePair(input.value);
                clearTimeout(input._renderTimer);
                input._renderTimer = setTimeout(rerender, 350);
            });
            input.addEventListener('change', rerender);
        });
        toggle.addEventListener('change', () => {
            secondaryWrap.hidden = !toggle.checked;
            rerender();
        });
    }

    function initDateControl() {
        const input = document.getElementById('official-history-date');
        input.max = formatApiDate(new Date());
        input.value = formatApiDate(new Date());
        const onDateChange = async () => {
            if (!input.value) return;
            document.getElementById('official-detail-date').textContent = 'იტვირთება...';
            pageState.days = await getRecentNbgDays(10, new Date(`${input.value}T00:00:00`));
            if (pageState.days[0]?.currencies?.length) {
                renderCurrencyCheckboxes(pageState.days[0].currencies);
            }
            renderHistoryCards(pageState.days);
        };
        if (window.flatpickr) {
            flatpickr(input, {
                dateFormat: 'Y-m-d',
                maxDate: 'today',
                defaultDate: input.value,
                onChange: onDateChange
            });
        } else {
            input.addEventListener('change', onDateChange);
        }
    }

    async function initOfficialDetailPage() {
        try {
            initTabs();
            initPairControls();
            initCurrencyDropdown();
            initDateControl();
            pageState.days = await getRecentNbgDays(10);
            if (pageState.days[0]?.currencies?.length) renderCurrencyCheckboxes(pageState.days[0].currencies);
            renderHistoryCards(pageState.days);
            await renderChart();
        } catch (error) {
            console.error('Official detail page load failed', error);
            document.getElementById('official-history-grid').innerHTML = '<div class="official-history-card">მონაცემების ჩატვირთვა ვერ მოხერხდა.</div>';
        }
    }

    document.addEventListener('DOMContentLoaded', initOfficialDetailPage);
</script>
</body>
