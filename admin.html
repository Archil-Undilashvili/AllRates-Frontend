<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="/favicon-192.png">
    <link rel="manifest" href="/site.webmanifest">
    <title>ადმინ პანელი - AllRates.ge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=4">
    <style>
        .admin-stat-card {
            background: var(--card-bg, #1e293b);
            border: 1px solid var(--border, #334155);
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            text-align: center;
        }
        .admin-stat-number {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary, #3b82f6);
            margin: 10px 0;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            text-align: left;
            background: var(--card-bg, #1e293b);
            border-radius: 12px;
            overflow: hidden;
        }
        .admin-table th, .admin-table td {
            padding: 15px;
            border-bottom: 1px solid var(--border, #334155);
            color: var(--text, #f1f5f9);
        }
        .admin-table th {
            background: rgba(0,0,0,0.2);
            font-weight: 600;
            color: var(--text-muted, #94a3b8);
            text-transform: uppercase;
            font-size: 13px;
        }
        .admin-table tr:last-child td {
            border-bottom: none;
        }
        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-verified { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-unverified { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-admin { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .badge-user { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KFQ7LLZ9EF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-KFQ7LLZ9EF');
    </script>
</head>
<body>
    <script src="js/header.js"></script>
    
    <div style="max-width: 1400px; margin: 40px auto; padding: 20px;">
        <h1 style="color: var(--text, #f1f5f9); margin-bottom: 30px;">ადმინ პანელი</h1>
        
        <div id="errorMsg" style="display: none; padding: 20px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold;"></div>

        <div id="adminContent" style="display: none;">
            <!-- სტატისტიკის ბლოკი -->
            <div style="display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap;">
                <div class="admin-stat-card">
                    <div style="color: var(--text-muted, #94a3b8); font-size: 14px;">სულ მომხმარებელი</div>
                    <div id="statTotal" class="admin-stat-number">0</div>
                </div>
                <div class="admin-stat-card">
                    <div style="color: var(--text-muted, #94a3b8); font-size: 14px;">ვერიფიცირებული</div>
                    <div id="statVerified" class="admin-stat-number" style="color: #10b981;">0</div>
                </div>
                <div class="admin-stat-card">
                    <div style="color: var(--text-muted, #94a3b8); font-size: 14px;">დაუდასტურებელი</div>
                    <div id="statUnverified" class="admin-stat-number" style="color: #ef4444;">0</div>
                </div>
            </div>

            <!-- მომხმარებლების ცხრილი -->
            <div style="overflow-x: auto; box-shadow: var(--shadow-sm); border-radius: 12px; border: 1px solid var(--border, #334155);">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>სახელი</th>
                            <th>ელ-ფოსტა</th>
                            <th>სტატუსი</th>
                            <th>როლი</th>
                            <th>რეგისტრაციის თარიღი</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="5" style="text-align: center;">იტვირთება მონაცემები...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const token = localStorage.getItem("token");
            const user = JSON.parse(localStorage.getItem("user"));
            const errorMsg = document.getElementById("errorMsg");
            const adminContent = document.getElementById("adminContent");

            // 1. შემოწმება დალოგინებულია თუ არა და არის თუ არა ადმინი ლოკალურად
            if (!token || !user || user.role !== 'admin') {
                errorMsg.style.display = "block";
                errorMsg.innerText = "წვდომა უარყოფილია. თქვენ არ გაქვთ ადმინისტრატორის უფლებები.";
                setTimeout(() => window.location.href = "/", 3000);
                return;
            }

            // 2. მონაცემების წამოღება ბექენდიდან
            try {
                const response = await fetch("http://localhost:3000/api/admin/users", {
                    method: "GET",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    adminContent.style.display = "block";
                    
                    // სტატისტიკის შევსება
                    document.getElementById("statTotal").innerText = data.stats.total;
                    document.getElementById("statVerified").innerText = data.stats.verified;
                    document.getElementById("statUnverified").innerText = data.stats.unverified;

                    // ცხრილის შევსება
                    const tbody = document.getElementById("usersTableBody");
                    tbody.innerHTML = ""; // ვასუფთავებთ "იტვირთება" ტექსტს

                    if(data.users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">ჯერჯერობით არცერთი მომხმარებელი არ არის დარეგისტრირებული.</td></tr>';
                    } else {
                        data.users.forEach(u => {
                            const date = new Date(u.createdAt).toLocaleString('ka-GE', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                            
                            const statusBadge = u.isVerified 
                                ? '<span class="badge badge-verified">ვერიფიცირებული</span>' 
                                : '<span class="badge badge-unverified">დაუდასტურებელი</span>';
                                
                            const roleBadge = u.role === 'admin' 
                                ? '<span class="badge badge-admin">ადმინი</span>' 
                                : '<span class="badge badge-user">იუზერი</span>';

                            const tr = document.createElement("tr");
                            tr.innerHTML = `
                                <td style="font-weight: 600;">${u.name}</td>
                                <td>${u.email}</td>
                                <td>${statusBadge}</td>
                                <td>${roleBadge}</td>
                                <td style="color: var(--text-muted, #94a3b8); font-size: 14px;">${date}</td>
                            `;
                            tbody.appendChild(tr);
                        });
                    }
                } else {
                    errorMsg.style.display = "block";
                    errorMsg.innerText = data.message || "შეცდომა მონაცემების წამოღებისას.";
                }
            } catch (error) {
                errorMsg.style.display = "block";
                errorMsg.innerText = "სერვერთან კავშირი ვერ მოხერხდა.";
                console.error("Fetch error:", error);
            }
        });
    </script>
<script src="js/footer.js?v=3"></script>
</body>
</html>
